name: CI/CD (dev)

on:
  push:
    branches:
      - dev
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Lint Markdown
        run: npm run lint

  deploy:
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      # TEMP: overlay an unpublished fix for eleventy-plugin-svg-social-card
      # that serializes screenshots so parallel renders don't stall on
      # GitHub Actions. Remove this step once the fix is published to npm
      # and wikizeit's package-lock.json picks up the new version.
      - name: Overlay unpublished plugin fix
        run: |
          set -eu
          EXPECTED_SHA=0adc9414999d38f5c1fb07326d21d522a97cb12c
          git clone --depth 1 --branch master \
            https://github.com/jcubic/eleventy-plugin-svg-social-card.git \
            /tmp/eleventy-plugin-svg-social-card
          ACTUAL_SHA=$(git -C /tmp/eleventy-plugin-svg-social-card rev-parse HEAD)
          echo "plugin HEAD: $ACTUAL_SHA"
          if [ "$ACTUAL_SHA" != "$EXPECTED_SHA" ]; then
            echo "::warning::expected plugin HEAD $EXPECTED_SHA, got $ACTUAL_SHA (master moved?)"
          fi
          cp /tmp/eleventy-plugin-svg-social-card/src/index.js \
             node_modules/eleventy-plugin-svg-social-card/src/index.js
          echo "overlaid node_modules/eleventy-plugin-svg-social-card/src/index.js"

      - name: Install Lovelo font
        run: |
          mkdir -p ~/.local/share/fonts
          cp src/card/Lovelo\ Black.otf ~/.local/share/fonts/
          fc-cache -f -v

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Install PHP dependencies
        run: composer install --no-dev --optimize-autoloader
        working-directory: api

      - name: Validate social card SVG
        run: |
          sudo apt-get install -y libxml2-utils
          node --input-type=module <<'EOF'
          import { Liquid } from 'liquidjs';
          import { readFile, writeFile, unlink } from 'fs/promises';
          import { execSync } from 'child_process';

          const liquid = new Liquid();
          const src = await readFile('src/card/social-card.svg', 'utf8');
          const tmpl = liquid.parse(src);
          const rendered = await liquid.render(tmpl, {
            username: 'jcubic',
            fullname: 'Jakub T. Jankiewicz',
            title: 'Test tytu&#322; z &amp; znakami specjalnymi',
            path: '/tmp',
            date: '1 stycznia 2026'
          });
          const tmp = '/tmp/validate-social-card.svg';
          await writeFile(tmp, rendered);
          try {
            execSync(`xmllint --noout ${tmp}`, { stdio: 'inherit' });
            console.log('SVG validation passed');
          } catch {
            console.error('::error::src/card/social-card.svg renders invalid XML');
            process.exit(1);
          } finally {
            await unlink(tmp).catch(() => {});
          }
          EOF

      - name: Build
        run: npm run build

      # TEMP: upload the generated _site so we can inspect why JSON-LD
      # validation fails on CI. `if: always()` ensures upload even when
      # subsequent steps fail. Remove once the JSON-LD issue is fixed.
      - name: Upload _site artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: site-dev
          path: _site
          if-no-files-found: warn
          retention-days: 7

      - name: Validate JSON-LD
        run: |
          node --input-type=module <<'EOF'
          import { readFileSync } from 'node:fs';
          import { execSync } from 'node:child_process';

          // Non-greedy match of every <script type="application/ld+json"> ... </script>
          // block. `sed`-based extraction was unsafe against minified HTML
          // because `/A/,/B/` ranges happily spanned from the real JSON-LD
          // script in <head> past code-block examples down to an unrelated
          // </script> elsewhere in the page.
          const re = /<script\s+type="application\/ld\+json"\s*>([\s\S]*?)<\/script>/g;

          const out = execSync(
            "grep -rl 'application/ld+json' _site/ --include='*.html' || true",
            { encoding: 'utf8' }
          );
          const files = out.split('\n').filter(Boolean);

          let fail = 0;
          for (const file of files) {
            const html = readFileSync(file, 'utf8');
            let match;
            let block = 0;
            re.lastIndex = 0;
            while ((match = re.exec(html)) !== null) {
              block++;
              try {
                JSON.parse(match[1]);
              } catch (e) {
                console.error(`::error file=${file}::Invalid JSON-LD (block ${block}): ${e.message}`);
                fail = 1;
              }
            }
          }
          process.exit(fail);
          EOF

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Deploy to server
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 3
          command: scp -P ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=no -r ./_site/* ./_site/.htaccess ${{ secrets.SSH_USER }}@${{ secrets.SSH_SERVER }}:${{ secrets.SSH_DEV_PATH }}
