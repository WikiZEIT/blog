name: Spell Check

on:
  push:
    branches:
      - master
      - dev
    paths:
      - 'src/**'
      - 'api/**'
      - 'scripts/**'
      - '.eleventy.js'
      - 'cspell.json'
      - 'project-words.txt'
      - '.github/workflows/spellcheck.yaml'
  pull_request:
    branches:
      - master
      - dev
    paths:
      - 'src/**'
      - 'api/**'
      - 'scripts/**'
      - '.eleventy.js'
      - 'cspell.json'
      - 'project-words.txt'

jobs:
  spellcheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Spell check
        run: npm run spell
